services:
  postgres:
    image: postgres:16-alpine
    container_name: tekken-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tekken
      POSTGRES_USER: tekken
      POSTGRES_PASSWORD: tekken
    volumes:
      - tekken-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekken -d tekken"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tekken-postgres-data:
